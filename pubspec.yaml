name: house_manager
description: House Management App

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.2

  # State management
  provider: ^6.1.2

  # UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  iconsax: ^0.0.8

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  image_picker: ^1.1.2
  pdf: ^3.11.1
  printing: ^5.13.1
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21